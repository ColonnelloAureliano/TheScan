<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&D Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: white;
  text-align: center;
}

.screen {
  display: none;
  min-height: 100dvh;
  padding: 20px;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.btn {
  padding: 15px 25px;
  background: #d71920;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 18px;
  margin-top: 20px;
}

#video {
  width: 100%;
  max-width: 400px;
  background: black;
  border-radius: 12px;
}

canvas {
  display: none;
}
</style>
</head>

<body>

<!-- START -->
<section id="screenStart" class="screen active">
  <h1>R&D CHALLENGE</h1>
  <p>Trova il codice segreto</p>
  <button id="btnEnter" class="btn">ENTRA</button>
</section>

<!-- SCAN -->
<section id="screenScan" class="screen">
  <p>Scansione attiva</p>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <p id="scanStatus">In attesa...</p>

  <button id="btnExit" class="btn">Esci</button>
</section>

<!-- RESULT -->
<section id="screenResult" class="screen">
  <h1>✅ Hai trovato il codice segreto</h1>
  <button id="btnContinue" class="btn">Continua</button>
</section>

<script src="app.js"></script>

</body>
</html>
