<!DOCTYPE html>

<head>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
}

  width: 90%;
  max-width: 400px;
  margin-top: 20px;

}
