<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&D Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1115;
  color: white;
  text-align: center;
}

.screen {
  display: none;
  min-height: 100dvh;
  padding: 20px;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.btn {
  padding: 16px 28px;
  background: #d71920;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 18px;
  margin-top: 25px;
  cursor: pointer;
}

#video {
  width: 100%;
  max-width: 400px;
  background: black;
  border-radius: 12px;
}

canvas {
  display: none;
}

.notice {
  margin-top: 12px;
  padding: 12px;
  font-size: 14px;
  border-radius: 10px;
  background: rgba(255,200,0,0.15);
  pointer-events: none; /* 🔥 FIX iPhone */
}

.notice.vertical {
  background: rgba(255,80,80,0.2);
}
</style>
</head>

<body>

<!-- START -->
<section id="screenStart" class="screen active">
  <h1>R&D CHALLENGE</h1>
  <p>Trova il codice segreto</p>

  <div id="noticeStart" class="notice">
    📱 Metti il telefono in orizzontale
  </div>

  <button id="btnEnter" class="btn">ENTRA</button>
</section>

<!-- SCAN -->
<section id="screenScan" class="screen">
  <p>Scansione attiva</p>

  <div id="noticeScan" class="notice">
    📱 Scansione migliore in orizzontale
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <p id="scanStatus">In attesa...</p>

  <p>Matches: <span id="goodMatches">0</span></p>
  <p>Inliers: <span id="inliers">0</span></p>
  <p>Rilevamento: <span id="detectionText">NO</span></p>

  <button id="btnExit" class="btn">Esci</button>
</section>

<!-- RESULT -->
<section id="screenResult" class="screen">
  <h1>✅ Hai trovato il codice segreto</h1>
  <button id="btnContinue" class="btn">Continua</button>
</section>

<!-- ✅ AGGIUNGI QUESTA -->
<img id="targetImage" src="target.jpg" style="display:none;">

<script src="app.js"></script>

</body>
</html>
